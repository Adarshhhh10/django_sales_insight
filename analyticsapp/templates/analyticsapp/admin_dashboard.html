<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body style="background-color: #f4f6f9;">

    <div class="container mt-5">
        <div class="card shadow-lg p-4 rounded-4">
            <h1 class="text-center text-primary mb-4">Admin Dashboard</h1>

            <div class="row text-center">
                <div class="col-md-4 mb-3">
                    <div class="card bg-primary text-white p-3 shadow rounded-4">
                        <h5>Total Users</h5>
                        <h3>25</h3>
                    </div>
                </div>

                <div class="col-md-4 mb-3">
                    <div class="card bg-success text-white p-3 shadow rounded-4">
                        <h5>Total Reports</h5>
                        <h3>12</h3>
                    </div>
                </div>

                <div class="col-md-4 mb-3">
                    <div class="card bg-warning text-dark p-3 shadow rounded-4">
                        <h5>Predictions Made</h5>
                        <h3>48</h3>
                    </div>
                </div>
            </div>

            <div class="mt-4 text-center">
                <a href="{% url 'home' %}" class="btn btn-dark">Back to Home</a>
            </div>
        </div>
    </div>

</body>
</html>
